<div class="min-h-screen bg-app-bg flex items-center justify-center p-6">
    <div class="w-full max-w-md rounded-app-lg border border-app-border bg-app-surface shadow-app-md p-8">
        <h1 class="text-2xl font-semibold text-app-text">Create your shop</h1>
        <p class="mt-2 text-sm text-app-text-muted">
            Set up Opscend and create your owner account.
        </p>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mt-6 space-y-4">
                <div>
                    <label class="mb-1 block text-sm font-medium text-app-text">Shop name</label>
                    <input
                        class="w-full rounded-app-md border border-app-border bg-white px-4 py-3 text-app-text outline-none"
                        type="text" autocomplete="organization" formControlName="shopName" />
                </div>

                <div>
                    <label class="mb-1 block text-sm font-medium text-app-text">Shop slug</label>
                    <input
                        class="w-full rounded-app-md border border-app-border bg-white px-4 py-3 text-app-text outline-none"
                        type="text" autocomplete="off" formControlName="slug" />
                    <p class="mt-1 text-xs text-app-text-muted">
                        {{ form.get('slug')?.value || 'your-shop' }}.app.opscend.app
                    </p>
                </div>

                <div>
                    <label class="mb-1 block text-sm font-medium text-app-text">Your name</label>
                    <input
                        class="w-full rounded-app-md border border-app-border bg-white px-4 py-3 text-app-text outline-none"
                        type="text" autocomplete="name" formControlName="ownerName" />
                </div>

                <div>
                    <label class="mb-1 block text-sm font-medium text-app-text">Email</label>
                    <input
                        class="w-full rounded-app-md border border-app-border bg-white px-4 py-3 text-app-text outline-none"
                        type="email" autocomplete="email" formControlName="ownerEmail" />
                </div>

                <div>
                    <label class="mb-1 block text-sm font-medium text-app-text">Password</label>
                    <input
                        class="w-full rounded-app-md border border-app-border bg-white px-4 py-3 text-app-text outline-none"
                        type="password" autocomplete="new-password" formControlName="password" />
                </div>

                <button
                    class="mt-2 w-full cursor-pointer rounded-app-md bg-brand px-4 py-3 text-sm font-medium text-white disabled:bg-brand-soft hover:bg-brand-soft"
                    [disabled]="loading || form.invalid">
                    {{ loading ? "Creating shop..." : "Create shop" }}
                </button>

                @if (error) {
                <p class="text-sm text-red-500">
                    {{ error }}
                </p>
                }

                <p class="text-sm text-app-text-muted">
                    Already have an account?
                    <a [routerLink]="['/login']" class="text-brand hover:text-brand-soft">
                        Sign in
                    </a>
                </p>
            </div>
        </form>
    </div>
</div>
